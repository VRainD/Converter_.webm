services:
  webm-converter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-2048}"
      MAX_CONCURRENT_JOBS: "${MAX_CONCURRENT_JOBS:-2}"
      JOB_RETENTION_HOURS: "${JOB_RETENTION_HOURS:-48}"
      TEMP_RETENTION_HOURS: "${TEMP_RETENTION_HOURS:-6}"
      ENABLE_ADVANCED_OPTIONS: "${ENABLE_ADVANCED_OPTIONS:-true}"
      DEFAULT_OUTPUT_FORMAT: "${DEFAULT_OUTPUT_FORMAT:-mp4}"
      DEFAULT_QUALITY_PROFILE: "${DEFAULT_QUALITY_PROFILE:-balanced}"
      GIF_MAX_DURATION_SEC: "${GIF_MAX_DURATION_SEC:-120}"
      FFMPEG_TIMEOUT_SEC: "${FFMPEG_TIMEOUT_SEC:-86400}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      DEBUG: "${DEBUG:-false}"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
      - ./data/temp:/app/data/temp
      - ./data/logs:/app/data/logs
    restart: unless-stopped
